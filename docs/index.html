<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="刘雨航 ChatGPT Work / Codex 动画桌宠" />
    <title>LYH Codex Pet</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0f17;
        color: #f4f7fb;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 15%, rgba(71, 118, 230, .28), transparent 34rem),
          radial-gradient(circle at 85% 80%, rgba(30, 195, 157, .18), transparent 30rem),
          #0b0f17;
      }
      main {
        width: min(920px, calc(100% - 32px));
        margin: 48px auto;
        padding: clamp(28px, 6vw, 64px);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 32px;
        background: rgba(17, 23, 35, .82);
        box-shadow: 0 24px 80px rgba(0,0,0,.42);
        backdrop-filter: blur(22px);
        text-align: center;
      }
      .pet-stage {
        width: 240px;
        height: 260px;
        margin: 0 auto 20px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background-color: #e8ecf3;
        background-image:
          linear-gradient(45deg, #d5dbe5 25%, transparent 25%),
          linear-gradient(-45deg, #d5dbe5 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #d5dbe5 75%),
          linear-gradient(-45deg, transparent 75%, #d5dbe5 75%);
        background-size: 32px 32px;
        background-position: 0 0, 0 16px, 16px -16px, -16px 0;
      }
      .pet {
        width: 192px;
        height: 208px;
        background-image: url("https://raw.githubusercontent.com/sarrithomas/lyh-codex-pet/main/assets/lyh_codex_pet.webp");
        background-repeat: no-repeat;
        background-size: 1536px 1872px;
        animation: idle 1.2s steps(1) infinite;
      }
      @keyframes idle {
        0% { background-position: 0 0; }
        16.66% { background-position: -192px 0; }
        33.33% { background-position: -384px 0; }
        50% { background-position: -576px 0; }
        66.66% { background-position: -768px 0; }
        83.33%, 100% { background-position: -960px 0; }
      }
      h1 { margin: 0; font-size: clamp(38px, 8vw, 68px); letter-spacing: -.05em; }
      .subtitle { margin: 12px auto 28px; color: #aeb8c8; font-size: 18px; }
      .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
      a.button {
        display: inline-flex;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
        border-radius: 14px;
        color: white;
        background: #3374f2;
        text-decoration: none;
        font-weight: 750;
      }
      a.secondary { background: rgba(255,255,255,.09); }
      .note { margin: 28px auto 0; max-width: 620px; color: #8591a4; font-size: 14px; line-height: 1.7; }
    </style>
  </head>
  <body>
    <main>
      <div class="pet-stage" aria-label="刘雨航桌宠待机动画"><div class="pet"></div></div>
      <h1>刘雨航桌宠</h1>
      <p class="subtitle">面向 ChatGPT Work 与 Codex 的开源动画桌宠</p>
      <div class="actions">
        <a class="button" href="codex://pets/install?name=%E5%88%98%E9%9B%A8%E8%88%AA&amp;imageUrl=https%3A%2F%2Fraw.githubusercontent.com%2Fsarrithomas%2Flyh-codex-pet%2Fmain%2Fassets%2Flyh_codex_pet.webp&amp;description=%E5%88%98%E9%9B%A8%E8%88%AA%20Q%20%E7%89%88%E5%8A%A8%E7%94%BB%E6%A1%8C%E5%AE%A0&amp;spriteVersionNumber=1">安装刘雨航桌宠</a>
        <a class="button secondary" href="https://github.com/sarrithomas/lyh-codex-pet">查看源码</a>
      </div>
      <p class="note">安装按钮需要在已支持 Pets 的 ChatGPT/Codex 桌面应用环境中打开。也可以从仓库下载透明 WebP 文件，在 Settings &gt; Pets 中手动上传。</p>
    </main>
  </body>
</html>
